<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #020617, #1e293b);
    color: #e2e8f0;
    text-align: center;
}

.container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

h1 {
    color: #38bdf8;
}

p {
    color: #94a3b8;
    line-height: 1.6;
}

ul {
    text-align: left;
    margin-top: 15px;
    color: #cbd5f5;
}

button {
    margin: 10px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.yes {
    background: #22c55e;
    color: white;
}

.no {
    background: #ef4444;
    color: white;
    position: absolute;
}

.hidden {
    display: none;
}

#finalMessage {
    font-size: 1.2rem;
    color: #facc15;
    margin-top: 20px;
}
</style>

</head>

</body>
</html>
